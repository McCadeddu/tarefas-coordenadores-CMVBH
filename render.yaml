databases:
  - name: tarefas-coordenadores-db
    databaseName: tarefas_coordenadores
    user: tarefas_coordenadores
    plan: starter
    region: ohio

services:
  - type: web
    name: tarefas-coordenadores
    runtime: node
    plan: starter
    region: ohio
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run prisma:generate && npm run build
    preDeployCommand: npx prisma db push
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_PROVIDER
        value: prisma
      - key: DATABASE_URL
        fromDatabase:
          name: tarefas-coordenadores-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: noreply@villaregia.org
