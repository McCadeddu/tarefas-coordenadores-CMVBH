version: "3.9"
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATA_PROVIDER: prisma
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tarefas_coordenadores?schema=public
      AUTH_SECRET: troque-esta-chave
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: noreply@villaregia.org
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tarefas_coordenadores
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
